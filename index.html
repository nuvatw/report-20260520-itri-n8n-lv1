<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成果報告時間軸</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --surface: #f8fbff;
      --paper: #ffffff;
      --ink: #162024;
      --muted: #687271;
      --line: rgba(22, 32, 36, .16);
      --line-strong: rgba(22, 32, 36, .34);
      --red: #1d4ed8;
      --teal: #224a8f;
      --yellow: #dbeafe;
      --blue: #224a8f;
      --shadow: rgba(22, 32, 36, .12);
      --report-bg-base: #f8fbff;
      --report-bg-line: rgba(29, 78, 216, .034);
      --report-bg-line-strong: rgba(29, 78, 216, .046);
      --report-bg-size: 42px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        linear-gradient(90deg, var(--report-bg-line-strong) 1px, transparent 1px),
        linear-gradient(0deg, var(--report-bg-line) 1px, transparent 1px),
        var(--report-bg-base);
      background-size: var(--report-bg-size) var(--report-bg-size);
      color: var(--ink);
      font-family: "Noto Sans TC", sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 34px 0 56px;
    }

    .masthead {
      border-top: 4px solid var(--ink);
      border-bottom: 1px solid var(--line-strong);
      padding: 18px 0 30px;
    }

    .brandline,
    .section-label,
    .meta,
    .eyebrow,
    .stat-label,
    .month-pin,
    .latest-badge,
    .clear-filters,
    .filter-label {
      font-family: "Archivo", sans-serif;
      font-weight: 800;
    }

    .brandline {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: .82rem;
      text-transform: uppercase;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 42px;
      align-items: end;
      margin-top: 64px;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--teal);
      font-size: .92rem;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 820px;
      font-family: "Noto Serif TC", serif;
      font-size: 5.8rem;
      line-height: .98;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .dek {
      max-width: 620px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.9;
    }

    .archive-plate {
      position: relative;
      min-height: 300px;
      border-left: 1px solid var(--line-strong);
      padding-left: 30px;
    }

    .plate-card {
      position: absolute;
      width: 230px;
      height: 286px;
      background: var(--paper);
      border: 1px solid var(--ink);
      box-shadow: 10px 12px 0 var(--shadow);
    }

    .plate-card:nth-child(1) {
      right: 62px;
      bottom: 4px;
      transform: rotate(-7deg);
      background:
        linear-gradient(90deg, transparent 22%, rgba(29, 78, 216, .18) 22%, rgba(29, 78, 216, .18) 23%, transparent 23%),
        var(--paper);
    }

    .plate-card:nth-child(2) {
      right: 20px;
      bottom: 20px;
      transform: rotate(3deg);
      background:
        linear-gradient(0deg, transparent 72%, rgba(29, 78, 216, .14) 72%, rgba(29, 78, 216, .14) 88%, transparent 88%),
        var(--paper);
    }

    .plate-card:nth-child(3) {
      right: 42px;
      bottom: 42px;
      display: grid;
      grid-template-rows: 58px 1fr 46px;
      overflow: hidden;
    }

    .plate-card:nth-child(3)::before {
      content: "";
      background: var(--red);
      border-bottom: 1px solid var(--ink);
    }

    .plate-card:nth-child(3)::after {
      content: "";
      align-self: end;
      height: 46px;
      background: var(--yellow);
      border-top: 1px solid var(--ink);
    }

    .plate-lines {
      padding: 24px;
    }

    .plate-lines span {
      display: block;
      height: 8px;
      margin-bottom: 12px;
      background: rgba(22, 32, 36, .16);
    }

    .plate-lines span:nth-child(1) {
      width: 72%;
      height: 14px;
      background: var(--ink);
    }

    .plate-lines span:nth-child(2) {
      width: 48%;
      background: var(--teal);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(260px, 420px) 1fr;
      gap: 24px;
      align-items: start;
      margin-top: 28px;
      padding: 24px 0;
      border-bottom: 1px solid var(--line-strong);
    }

    .search {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--paper);
      padding: 0 16px;
      color: var(--ink);
      outline: none;
      box-shadow: 6px 7px 0 rgba(22, 32, 36, .08);
    }

    .search:focus {
      border-color: var(--red);
      box-shadow: 6px 7px 0 rgba(29, 78, 216, .14);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
      max-width: 100%;
    }

    .filter-panel {
      display: grid;
      gap: 14px;
      justify-items: end;
      min-width: 0;
      max-width: 100%;
    }

    .filter-line {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      min-width: 0;
      max-width: 100%;
    }

    .filter-label {
      color: var(--muted);
      font-size: .72rem;
      text-transform: uppercase;
    }

    .chip,
    .month-chip,
    .clear-filters,
    .inline-clear {
      min-height: 40px;
      border: 1px solid var(--ink);
      border-radius: 999px;
      background: transparent;
      color: var(--ink);
      padding: 0 16px;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, color .16s ease;
    }

    .chip:hover,
    .month-chip:hover,
    .clear-filters:hover,
    .inline-clear:hover {
      transform: translateY(-2px);
    }

    .chip.is-active,
    .month-chip.is-active {
      background: var(--ink);
      color: var(--paper);
    }

    .chip-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      min-height: 22px;
      margin-left: 7px;
      border-radius: 999px;
      background: rgba(22, 32, 36, .08);
      color: inherit;
      font-family: "Archivo", sans-serif;
      font-size: .74rem;
      font-weight: 900;
    }

    .chip.is-active .chip-count,
    .month-chip.is-active .chip-count {
      background: rgba(255, 255, 255, .18);
    }

    .month-nav {
      display: flex;
      gap: 10px;
      align-items: center;
      overflow-x: auto;
      padding: 18px 0;
      border-bottom: 1px solid var(--line-strong);
      scrollbar-width: thin;
    }

    .month-chip {
      flex: 0 0 auto;
      min-height: 42px;
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 5px 6px 0 rgba(22, 32, 36, .07);
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--line-strong);
    }

    .stat {
      padding: 24px 20px 22px 0;
      border-right: 1px solid var(--line);
    }

    .stat + .stat {
      padding-left: 20px;
    }

    .stat:last-child {
      border-right: 0;
    }

    .stat-label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: .78rem;
      text-transform: uppercase;
    }

    .stat-value {
      font-family: "Archivo", sans-serif;
      font-size: 2.6rem;
      font-weight: 900;
      line-height: 1;
    }

    .content {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 48px;
      margin-top: 40px;
    }

    .rail {
      position: sticky;
      top: 24px;
      align-self: start;
      padding-top: 4px;
    }

    .section-label {
      margin: 0;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--ink);
      color: var(--red);
      font-size: .86rem;
      text-transform: uppercase;
    }

    .rail-note {
      margin: 18px 0 0;
      color: var(--muted);
      line-height: 1.85;
      font-size: .95rem;
    }

    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .filter-token {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(255, 255, 255, .68);
      padding: 0 10px;
      color: var(--ink);
      font-size: .78rem;
      font-weight: 700;
    }

    .clear-filters {
      display: inline-flex;
      align-items: center;
      margin-top: 14px;
      min-height: 36px;
      border-radius: 8px;
      border-color: var(--red);
      color: var(--red);
      font-size: .78rem;
      text-transform: uppercase;
    }

    .clear-filters[hidden] {
      display: none;
    }

    .timeline {
      position: relative;
      padding-left: 28px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      top: 4px;
      bottom: 0;
      left: 0;
      width: 2px;
      background: var(--ink);
    }

    .month-group {
      position: relative;
      margin-bottom: 22px;
    }

    .month-pin {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      margin-bottom: 10px;
      border: 1px solid var(--ink);
      background: var(--yellow);
      padding: 0 10px;
      font-size: .78rem;
    }

    .month-pin::before {
      content: "";
      position: absolute;
      left: -37px;
      width: 14px;
      height: 14px;
      border: 2px solid var(--ink);
      background: var(--surface);
      border-radius: 50%;
    }

    .report-card {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr) 96px;
      gap: 14px;
      align-items: stretch;
      min-height: 94px;
      margin-bottom: 8px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      background: var(--paper);
      text-decoration: none;
      overflow: hidden;
      box-shadow: 4px 5px 0 rgba(22, 32, 36, .06);
      transition: transform .14s cubic-bezier(.23, 1, .32, 1), box-shadow .14s ease;
    }

    .report-main-link {
      display: contents;
      color: inherit;
      text-decoration: none;
    }

    .report-card.is-latest {
      border-color: var(--red);
      box-shadow: 4px 5px 0 rgba(29, 78, 216, .1);
    }

    .report-card.is-private {
      border-style: dashed;
      background:
        linear-gradient(90deg, rgba(22, 32, 36, .035), transparent 46%),
        var(--paper);
    }

    .report-card:hover {
      transform: translateY(-1px);
      box-shadow: 5px 6px 0 rgba(22, 32, 36, .09);
    }

    .date-block {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: var(--ink);
      color: var(--paper);
      padding: 12px 10px;
    }

    .date-day {
      font-family: "Archivo", sans-serif;
      font-size: 2rem;
      font-weight: 900;
      line-height: .9;
    }

    .date-month {
      color: rgba(255, 255, 255, .74);
      font-family: "Archivo", sans-serif;
      font-size: .74rem;
      font-weight: 800;
    }

    .report-body {
      padding: 12px 0;
      min-width: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      color: var(--teal);
      font-size: .72rem;
      text-transform: uppercase;
    }

    .latest-badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      border: 1px solid var(--red);
      border-radius: 999px;
      background: rgba(29, 78, 216, .08);
      color: var(--red);
      padding: 0 7px;
      font-size: .62rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .report-title {
      margin: 0;
      font-family: "Noto Serif TC", serif;
      font-size: 1.1rem;
      font-weight: 900;
      line-height: 1.28;
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .report-subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.45;
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .report-side {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 12px 12px 0;
      color: var(--muted);
      font-size: .76rem;
      text-align: right;
    }

    .open-mark {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-bottom: 1px solid var(--red);
      color: var(--red);
      font-weight: 900;
      white-space: nowrap;
    }

    .visibility-badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 0 7px;
      color: var(--muted);
      font-size: .62rem;
      font-weight: 900;
      letter-spacing: .06em;
    }

    .visibility-badge.is-public {
      border-color: rgba(29, 78, 216, .36);
      background: rgba(29, 78, 216, .08);
      color: var(--blue);
    }

    .visibility-badge.is-private {
      border-color: rgba(104, 114, 113, .35);
      background: rgba(104, 114, 113, .08);
    }

    .admin-controls {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(160px, 1fr) auto auto;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      border-top: 1px solid var(--line);
      background: rgba(244, 246, 242, .72);
      padding: 6px 12px;
    }

    .admin-status-text {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 800;
    }

    .visibility-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 900;
      padding: 4px 0;
    }

    .toggle-track {
      position: relative;
      width: 44px;
      height: 24px;
      border: 1px solid rgba(104, 114, 113, .44);
      border-radius: 999px;
      background: #d6ddda;
      transition: background .18s ease, border-color .18s ease;
    }

    .toggle-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(22, 32, 36, .18);
      transition: transform .18s ease;
    }

    .visibility-toggle.is-public {
      color: var(--blue);
    }

    .visibility-toggle.is-public .toggle-track {
      border-color: rgba(29, 78, 216, .54);
      background: var(--blue);
    }

    .visibility-toggle.is-public .toggle-knob {
      transform: translateX(20px);
    }

    .visibility-toggle:focus-visible {
      outline: 3px solid rgba(29, 78, 216, .22);
      outline-offset: 4px;
    }

    .guest-pin-editor {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(160px, 1fr) auto auto;
      align-items: center;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .guest-pin-copy {
      display: grid;
      gap: 3px;
      color: var(--muted);
      font-size: .76rem;
      line-height: 1.35;
    }

    .guest-pin-copy strong {
      color: var(--ink);
      font-size: .82rem;
      font-weight: 900;
    }

    .guest-pin-input-wrap {
      position: relative;
      display: inline-grid;
      align-items: center;
    }

    .guest-pin-field {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      cursor: text;
    }

    .guest-pin-digits {
      display: grid;
      grid-template-columns: repeat(4, 28px);
      gap: 6px;
      pointer-events: none;
    }

    .guest-pin-cell {
      display: grid;
      place-items: center;
      width: 28px;
      height: 30px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: rgba(255, 255, 255, .8);
      color: var(--ink-faint);
      font-family: "Archivo", sans-serif;
      font-size: .78rem;
      font-weight: 900;
      transition: border-color .16s ease, box-shadow .16s ease, color .16s ease;
    }

    .guest-pin-cell.is-filled {
      border-color: var(--teal);
      color: var(--ink);
      box-shadow: inset 0 -3px 0 rgba(29, 78, 216, .14);
    }

    .guest-pin-input-wrap:focus-within .guest-pin-cell {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, .13);
    }

    .guest-pin-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
    }

    .guest-pin-details {
      justify-self: end;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 900;
    }

    .guest-pin-details summary {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(255, 255, 255, .68);
      cursor: pointer;
      padding: 0 10px;
      transition: background .14s ease, border-color .14s ease, color .14s ease, transform .14s cubic-bezier(.23, 1, .32, 1);
    }

    .guest-pin-details summary:hover,
    .guest-pin-details summary:focus-visible {
      border-color: var(--teal);
      color: var(--teal);
      outline: none;
      transform: translateY(-1px);
    }

    .guest-pin-details[open] {
      grid-column: 1 / -1;
      justify-self: stretch;
    }

    .guest-pin-details[open] summary {
      margin-bottom: 8px;
    }

    .pin-save,
    .pin-clear {
      min-height: 32px;
      border: 1px solid var(--ink);
      border-radius: 6px;
      background: var(--ink);
      color: var(--paper);
      padding: 0 10px;
      cursor: pointer;
      font-weight: 900;
      transition: transform .16s ease, background .16s ease, opacity .16s ease;
    }

    .pin-clear {
      background: transparent;
      color: var(--ink);
    }

    .pin-save:disabled {
      cursor: not-allowed;
      opacity: .42;
    }

    .pin-save:not(:disabled):hover,
    .pin-save:not(:disabled):focus-visible,
    .pin-clear:hover,
    .pin-clear:focus-visible {
      transform: translateY(-1px);
      background: var(--teal);
      color: var(--paper);
      outline: none;
    }

    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      background: rgba(255, 255, 255, .58);
      padding: 34px;
      color: var(--muted);
      line-height: 1.8;
    }

    .empty strong {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 1.08rem;
    }

    .inline-clear {
      margin-top: 18px;
      border-color: var(--red);
      border-radius: 8px;
      color: var(--red);
      font-weight: 900;
    }

    .admin-login {
      margin-top: 54px;
      border-top: 4px solid var(--ink);
      padding-top: 22px;
    }

    .admin-login-inner {
      width: 100%;
      display: grid;
      gap: 18px;
      border-bottom: 1px solid var(--line-strong);
      padding-bottom: 26px;
    }

    .admin-toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .admin-login-button,
    .admin-logout {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--ink);
      color: var(--paper);
      padding: 0 18px;
      cursor: pointer;
      font-weight: 900;
      text-decoration: none;
      transition: transform .16s ease, background .16s ease;
    }

    .admin-login-button[hidden],
    .admin-logout[hidden] {
      display: none;
    }

    .admin-login-button:hover,
    .admin-login-button:focus-visible,
    .admin-logout:hover,
    .admin-logout:focus-visible {
      transform: translateY(-2px);
      background: var(--teal);
      outline: none;
    }

    .admin-logout {
      justify-self: end;
      background: transparent;
      color: var(--ink);
    }

    .admin-logout:hover,
    .admin-logout:focus-visible {
      color: var(--paper);
    }

    .theme-panel {
      display: grid;
      grid-template-columns: minmax(180px, 260px) minmax(0, 1fr);
      gap: 24px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: rgba(255, 255, 255, .62);

      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background-color: var(--report-bg-base);
      background-image: var(--report-bg-image);
      background-size: var(--report-bg-size) var(--report-bg-size-y, var(--report-bg-size));
      display: grid;
      align-content: end;
      padding: 14px;

      width: max-content;
      max-width: 100%;

      background: var(--paper);
      color: var(--ink);

      gap: 16px;

      grid-template-columns: 108px minmax(0, 1fr);

      align-items: center;

      color: var(--muted);
      font-size: .82rem;
      font-weight: 900;

      flex-wrap: wrap;
      gap: 8px;

    .theme-option,

      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      padding: 0 12px;
      font-weight: 900;
      transition: background .16s ease, color .16s ease, border-color .16s ease, transform .16s ease;

    .theme-option:hover,
    .theme-option:focus-visible,
    .theme-option.is-active,
    .theme-reset:hover,
    .theme-reset:focus-visible {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
      outline: none;
      transform: translateY(-1px);

    .theme-swatch {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--swatch);
      cursor: pointer;
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;

    .theme-swatch:hover,

      transform: translateY(-1px);

      <aside class="rail">
        <p class="section-label">時間軸</p>
        <p class="rail-note" id="result-note">目前顯示全部報告。</p>
        <div class="active-filters" id="active-filters"></div>
        <button class="clear-filters" id="clear-filters" type="button" hidden>清除篩選</button>
      </aside>
      <div class="timeline" id="timeline"></div>
    </section>

    <section class="admin-login" id="admin-login" aria-label="登入">
      <div class="admin-login-inner">
        <div class="admin-toolbar">
          <a class="admin-login-button" id="admin-login-link" href="login.html">登入</a>
          <button class="admin-logout" id="admin-logout" type="button" hidden>登出</button>
        </div>
        <section class="theme-panel" id="theme-panel" aria-label="背景設定" hidden>
          <div class="theme-preview" aria-hidden="true">
            <span>背景預覽</span>
          </div>
          <div class="theme-controls">
            <div class="theme-row">
              <div class="theme-label">紋路</div>
              <div class="theme-segmented" role="group" aria-label="背景紋路">
                <button class="theme-option" type="button" data-theme-pattern="grid">格線</button>
                <button class="theme-option" type="button" data-theme-pattern="dot">點陣</button>
                <button class="theme-option" type="button" data-theme-pattern="ruled">橫線</button>
                <button class="theme-option" type="button" data-theme-pattern="none">無</button>
              </div>
            </div>
            <div class="theme-row">
              <div class="theme-label">底色</div>
              <div class="theme-swatches" aria-label="背景底色色票">
                <button class="theme-swatch" type="button" data-theme-color="#ffffff" style="--swatch:#ffffff" aria-label="白色"></button>
                <button class="theme-swatch" type="button" data-theme-color="#f8fbff" style="--swatch:#f8fbff" aria-label="冷白"></button>
                <button class="theme-swatch" type="button" data-theme-color="#eff6ff" style="--swatch:#eff6ff" aria-label="淡藍白"></button>
                <button class="theme-swatch" type="button" data-theme-color="#dbeafe" style="--swatch:#dbeafe" aria-label="淺藍"></button>
                <input class="theme-color-input" id="theme-color" type="color" aria-label="自訂背景底色" value="#f8fbff">
              </div>
            </div>
            <label class="theme-row" for="theme-opacity">
              <span class="theme-label">透明度</span>
              <span class="theme-range">
                <input id="theme-opacity" type="range" min="0" max="0.12" step="0.004">
                <output id="theme-opacity-value">3%</output>
              </span>
            </label>
            <label class="theme-row" for="theme-brightness">
              <span class="theme-label">亮度</span>
              <span class="theme-range">
                <input id="theme-brightness" type="range" min="0.88" max="1.12" step="0.01">
                <output id="theme-brightness-value">104%</output>
              </span>
            </label>
            <label class="theme-row" for="theme-size">
              <span class="theme-label">密度</span>
              <span class="theme-range">
                <input id="theme-size" type="range" min="28" max="72" step="2">
                <output id="theme-size-value">42px</output>
              </span>
            </label>
            <div class="theme-footer">
              <span class="theme-status" id="theme-status" aria-live="polite">已套用</span>
              <button class="theme-reset" id="theme-reset" type="button">重設背景</button>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script>
    window.REPORT_TIMELINE_LOAD_STATE = 'pending';
  </script>
  <script
    src="data/reports.js"
    onload="window.REPORT_TIMELINE_LOAD_STATE = 'ready'"
    onerror="window.REPORT_TIMELINE_LOAD_STATE = 'error'"></script>
  <script>
    const dataLoadState = window.REPORT_TIMELINE_LOAD_STATE;
    const payload = window.REPORT_TIMELINE || { generatedAt: '', reports: [] };
    const reports = Array.isArray(payload.reports) ? payload.reports : [];
    const hasIndexLoadError = dataLoadState === 'error';
    const adminStorageKey = 'nuva-report-admin-auth';
    const visibilityStorageKey = 'nuva-report-visibility-overrides';
    const guestPinStorageKey = 'nuva-report-guest-pins';
    const adminState = {
      isAdmin: readSessionValue(adminStorageKey) === 'true',
      visibilityOverrides: readVisibilityOverrides(),
      guestPins: readGuestPins()
    };
    const state = {
      query: '',
      category: '全部',
      year: '全部',
      month: '全部'
    };
    const themePatternLabels = {
      grid: '格線',
      dot: '點陣',
      ruled: '橫線',
      none: '無'
    };
    let themeStatusTimer = 0;

    const nodes = {
      generatedAt: document.querySelector('#generated-at'),
      totalCount: document.querySelector('#total-count'),
      latestDate: document.querySelector('#latest-date'),
      categoryCount: document.querySelector('#category-count'),
      monthCount: document.querySelector('#month-count'),
      posterCount: document.querySelector('#poster-count'),
      posterCategoryCount: document.querySelector('#poster-category-count'),
      posterMonthCount: document.querySelector('#poster-month-count'),
      yearChips: document.querySelector('#year-chips'),
      chips: document.querySelector('#category-chips'),
      monthNav: document.querySelector('#month-nav'),
      search: document.querySelector('#search'),
      timeline: document.querySelector('#timeline'),
      resultNote: document.querySelector('#result-note'),
      activeFilters: document.querySelector('#active-filters'),
      clearFilters: document.querySelector('#clear-filters'),
      adminLogin: document.querySelector('#admin-login-link'),
      adminLogout: document.querySelector('#admin-logout'),
      themePanel: document.querySelector('#theme-panel'),
      themePatternButtons: [...document.querySelectorAll('[data-theme-pattern]')],
      themeSwatches: [...document.querySelectorAll('[data-theme-color]')],
      themeColor: document.querySelector('#theme-color'),
      themeOpacity: document.querySelector('#theme-opacity'),
      themeOpacityValue: document.querySelector('#theme-opacity-value'),
      themeBrightness: document.querySelector('#theme-brightness'),
      themeBrightnessValue: document.querySelector('#theme-brightness-value'),
      themeSize: document.querySelector('#theme-size'),
      themeSizeValue: document.querySelector('#theme-size-value'),
      themeStatus: document.querySelector('#theme-status'),
      themeReset: document.querySelector('#theme-reset')
    };

    function readSessionValue(key) {
      try {
        return window.sessionStorage.getItem(key);
      } catch {
        return null;
      }
    }

    function writeSessionValue(key, value) {
      try {
        window.sessionStorage.setItem(key, value);
      } catch {
        // 靜態檔案或隱私模式可能停用 sessionStorage，畫面仍維持當次狀態。
      }
    }

    function removeSessionValue(key) {
      try {
        window.sessionStorage.removeItem(key);
      } catch {
        // 同上，忽略儲存層錯誤。
      }
    }

    function writeLocalValue(key, value) {
      try {
        window.localStorage.setItem(key, value);
      } catch {
        // 公開狀態切換只是本機偏好，儲存失敗時不阻擋頁面操作。
      }
    }

    function readCookieValue(key) {
      const prefix = `${encodeURIComponent(key)}=`;
      return String(document.cookie || '')
        .split(';')
        .map((part) => part.trim())
        .find((part) => part.startsWith(prefix))
        ?.slice(prefix.length) || '';
    }

    function writeCookieValue(key, value) {
      try {
        document.cookie = `${encodeURIComponent(key)}=${encodeURIComponent(value)}; path=/; max-age=31536000; SameSite=Lax`;
      } catch {
        // Cookie 只是跨路徑備援，失敗時仍保留其他儲存方式。
      }
    }

    function readWindowNameValue(key) {
      const prefix = `${key}:`;
      const current = String(window.name || '');
      return current.startsWith(prefix) ? decodeURIComponent(current.slice(prefix.length)) : '';
    }

    function writeWindowNameValue(key, value) {
      try {
        window.name = `${key}:${encodeURIComponent(value)}`;
      } catch {
        // 同上，window.name 是最後備援。
      }
    }

    function readVisibilityOverrides() {
      try {
        const raw = window.localStorage.getItem(visibilityStorageKey);
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveVisibilityOverrides() {
      writeLocalValue(visibilityStorageKey, JSON.stringify(adminState.visibilityOverrides));
    }

    function normalizePin(value) {
      return String(value || '').replace(/\D/g, '').slice(0, 4);
    }

    function readGuestPins() {
      function parse(raw) {
        const parsed = raw ? JSON.parse(raw) : {};
        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return {};
        return Object.fromEntries(
          Object.entries(parsed)
            .map(([id, pin]) => [id, normalizePin(pin)])
            .filter(([, pin]) => pin.length === 0 || pin.length === 4)
        );
      }

      try {
        const raw = window.sessionStorage.getItem(guestPinStorageKey);
        const sessionPins = parse(raw);
        const cookiePins = parse(decodeURIComponent(readCookieValue(guestPinStorageKey) || ''));
        const windowPins = parse(readWindowNameValue(guestPinStorageKey));
        const localRaw = window.localStorage.getItem(guestPinStorageKey);
        const localPins = parse(localRaw);
        return { ...localPins, ...cookiePins, ...sessionPins, ...windowPins };
      } catch {
        try {
          const raw = window.sessionStorage.getItem(guestPinStorageKey);
          const sessionPins = parse(raw);
          const cookiePins = parse(decodeURIComponent(readCookieValue(guestPinStorageKey) || ''));
          const windowPins = parse(readWindowNameValue(guestPinStorageKey));
          return { ...cookiePins, ...sessionPins, ...windowPins };
        } catch {
          try {
            const cookiePins = parse(decodeURIComponent(readCookieValue(guestPinStorageKey) || ''));
            const windowPins = parse(readWindowNameValue(guestPinStorageKey));
            return { ...cookiePins, ...windowPins };
          } catch {
            return {};
          }
        }
      }
    }

    function saveGuestPins() {
      const value = JSON.stringify(adminState.guestPins);
      writeLocalValue(guestPinStorageKey, value);
      writeSessionValue(guestPinStorageKey, value);
      writeCookieValue(guestPinStorageKey, value);
      writeWindowNameValue(guestPinStorageKey, value);
    }

    function themeDefaults() {
      return window.NUVA_REPORT_THEME?.defaults || {
        pattern: 'grid',
        color: '#f8fbff',
        lineColor: '#1d4ed8',
        opacity: 0.034,
        brightness: 1.04,
        contrast: 0.92,
        size: 42
      };
    }

    function readThemeSettings() {
      if (window.NUVA_REPORT_THEME?.read) return window.NUVA_REPORT_THEME.read();
      return { ...themeDefaults() };
    }

    function activeThemePattern() {
      return nodes.themePanel?.dataset.themePattern || readThemeSettings().pattern || 'grid';
    }

    function themeFormSettings() {
      const defaults = themeDefaults();
      return {
        pattern: activeThemePattern(),
        color: nodes.themeColor?.value || defaults.color,
        lineColor: defaults.lineColor,
        opacity: Number(nodes.themeOpacity?.value ?? defaults.opacity),
        brightness: Number(nodes.themeBrightness?.value ?? defaults.brightness),
        contrast: defaults.contrast,
        size: Number(nodes.themeSize?.value ?? defaults.size)
      };
    }

    function formatPercent(value) {
      return `${Math.round(Number(value) * 100)}%`;
    }

    function renderThemeControls(settings = readThemeSettings()) {
      if (!nodes.themePanel) return;

      nodes.themePanel.dataset.themePattern = settings.pattern;
      nodes.themePatternButtons.forEach((button) => {
        const active = button.dataset.themePattern === settings.pattern;
        button.classList.toggle('is-active', active);
        button.setAttribute('aria-pressed', String(active));
      });

      nodes.themeSwatches.forEach((button) => {
        button.classList.toggle('is-active', button.dataset.themeColor?.toLowerCase() === settings.color.toLowerCase());
      });

      if (nodes.themeColor) nodes.themeColor.value = settings.color;
      if (nodes.themeOpacity) nodes.themeOpacity.value = settings.opacity;
      if (nodes.themeBrightness) nodes.themeBrightness.value = settings.brightness;
      if (nodes.themeSize) nodes.themeSize.value = settings.size;
      if (nodes.themeOpacityValue) nodes.themeOpacityValue.textContent = formatPercent(settings.opacity);
      if (nodes.themeBrightnessValue) nodes.themeBrightnessValue.textContent = formatPercent(settings.brightness);
      if (nodes.themeSizeValue) nodes.themeSizeValue.textContent = `${settings.size}px`;
    }

    function setThemeStatus(message) {
      if (!nodes.themeStatus) return;
      nodes.themeStatus.textContent = message;
      window.clearTimeout(themeStatusTimer);
      themeStatusTimer = window.setTimeout(() => {
        nodes.themeStatus.textContent = '已套用';
      }, 1400);
    }

    function saveThemeFromControls(message = '已套用') {
      const settings = themeFormSettings();
      const saved = window.NUVA_REPORT_THEME?.save
        ? window.NUVA_REPORT_THEME.save(settings)
        : settings;
      renderThemeControls(saved);
      setThemeStatus(message);
    }

    function loginReturnPath() {
      return `${window.location.pathname}${window.location.search}${window.location.hash}` || 'index.html';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatDate(date) {
      if (!date) return '--';
      const [year, month, day] = date.split('-');
      return day ? `${year}.${month}.${day}` : date;
    }

    function dateParts(date) {
      const [year = '--', month = '--', day = '--'] = String(date || '').split('-');
      return { year, month, day };
    }

    function reportYear(report) {
      return String(report.date || '').slice(0, 4) || '未設定';
    }

    function formatGeneratedAt(value) {
      if (hasIndexLoadError) return '索引遺失';
      if (!value) return '索引建立中';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '索引已建立';
      return `更新時間 ${date.toLocaleString('zh-TW', { hour12: false })}`;
    }

    function defaultVisibility(report) {
      return report.visibility || 'public';
    }

    function effectiveVisibility(report) {
      return adminState.visibilityOverrides[report.id] || defaultVisibility(report);
    }

    function defaultGuestPin(report) {
      return normalizePin(report.guestPin || report.guestPassword || '');
    }

    function effectiveGuestPin(report) {
      return Object.prototype.hasOwnProperty.call(adminState.guestPins, report.id)
        ? normalizePin(adminState.guestPins[report.id])
        : defaultGuestPin(report);
    }

    function isPublicReport(report) {
      return effectiveVisibility(report) === 'public';
    }

    function availableReports() {
      return adminState.isAdmin ? reports : reports.filter(isPublicReport);
    }

    function hiddenReportCount() {
      return reports.filter((report) => !isPublicReport(report)).length;
    }

    function latestReportId() {
      return availableReports()[0]?.id || '';
    }

    function categories(items = availableReports()) {
      return [...new Set(items.map((report) => report.category).filter(Boolean))];
    }

    function years(items = availableReports()) {
      return [...new Set(items.map(reportYear).filter(Boolean))];
    }

    function months(items = availableReports()) {
      return [...new Set(items.map((report) => report.month).filter(Boolean))];
    }

    function countBy(items, getter) {
      return items.reduce((counts, item) => {
        const key = getter(item);
        counts[key] = (counts[key] || 0) + 1;
        return counts;
      }, {});
    }

    function reportsForMonthNav() {
      return availableReports().filter((report) => {
        const categoryMatch = state.category === '全部' || report.category === state.category;
        const yearMatch = state.year === '全部' || reportYear(report) === state.year;
        return categoryMatch && yearMatch;
      });
    }

    function filteredReports() {
      const query = state.query.trim().toLowerCase();
      return availableReports().filter((report) => {
        const categoryMatch = state.category === '全部' || report.category === state.category;
        const yearMatch = state.year === '全部' || reportYear(report) === state.year;
        const monthMatch = state.month === '全部' || report.month === state.month;
        const queryMatch = !query || String(report.search || '').toLowerCase().includes(query);
        return categoryMatch && yearMatch && monthMatch && queryMatch;
      });
    }

    function groupByMonth(items) {
      return items.reduce((groups, report) => {
        const key = report.month || '未設定日期';
        groups[key] = groups[key] || [];
        groups[key].push(report);
        return groups;
      }, {});
    }

    function renderChips() {
      const source = availableReports();
      const counts = countBy(source, (report) => report.category);
      const values = ['全部', ...categories()];
      nodes.chips.innerHTML = values.map((category) => {
        const active = category === state.category ? ' is-active' : '';
        const count = category === '全部' ? source.length : counts[category] || 0;
        return `
          <button class="chip${active}" type="button" data-category="${escapeHtml(category)}" aria-pressed="${category === state.category}">
            ${escapeHtml(category)}
            <span class="chip-count">${count}</span>
          </button>
        `;
      }).join('');
    }

    function renderYearChips() {
      const source = availableReports();
      const counts = countBy(source, reportYear);
      const values = ['全部', ...years()];
      nodes.yearChips.innerHTML = values.map((year) => {
        const active = year === state.year ? ' is-active' : '';
        const label = year === '全部' ? '全部年度' : year;
        const count = year === '全部' ? source.length : counts[year] || 0;
        return `
          <button class="chip${active}" type="button" data-year="${escapeHtml(year)}" aria-pressed="${year === state.year}">
            ${escapeHtml(label)}
            <span class="chip-count">${count}</span>
          </button>
        `;
      }).join('');
    }

    function renderMonthNav() {
      const source = reportsForMonthNav();
      const availableMonths = months(source);
      if (state.month !== '全部' && !availableMonths.includes(state.month)) {
        state.month = '全部';
      }

      const counts = countBy(source, (report) => report.month);
      const values = ['全部', ...availableMonths];
      nodes.monthNav.innerHTML = values.map((month) => {
        const active = month === state.month ? ' is-active' : '';
        const label = month === '全部' ? '全部月份' : month;
        const count = month === '全部' ? source.length : counts[month] || 0;
        return `
          <button class="month-chip${active}" type="button" data-month="${escapeHtml(month)}" aria-pressed="${month === state.month}">
            ${escapeHtml(label)}
            <span class="chip-count">${count}</span>
          </button>
        `;
      }).join('');
    }

    function renderStats(items) {
      const source = availableReports();
      nodes.generatedAt.textContent = formatGeneratedAt(payload.generatedAt);
      nodes.totalCount.textContent = source.length;
      nodes.latestDate.textContent = source[0] ? formatDate(source[0].date) : '--';
      nodes.categoryCount.textContent = categories(source).length;
      nodes.monthCount.textContent = months(source).length;
      if (nodes.posterCount) nodes.posterCount.textContent = source.length;
      if (nodes.posterCategoryCount) nodes.posterCategoryCount.textContent = categories(source).length;
      if (nodes.posterMonthCount) nodes.posterMonthCount.textContent = months(source).length;
      const modeText = adminState.isAdmin ? '管理模式' : '公開模式';
      nodes.resultNote.textContent = items.length === source.length
        ? `目前以${modeText}顯示全部可見報告。`
        : `目前顯示 ${items.length} / ${source.length} 份可見報告。`;
    }

    function activeFilterTokens() {
      return [
        state.query.trim() ? `搜尋：${state.query.trim()}` : '',
        state.category !== '全部' ? `分類：${state.category}` : '',
        state.year !== '全部' ? `年度：${state.year}` : '',
        state.month !== '全部' ? `月份：${state.month}` : ''
      ].filter(Boolean);
    }

    function renderActiveFilters() {
      const tokens = activeFilterTokens();
      nodes.activeFilters.innerHTML = tokens.map((token) => `<span class="filter-token">${escapeHtml(token)}</span>`).join('');
      nodes.clearFilters.hidden = tokens.length === 0;
    }

    function resetFilters() {
      state.query = '';
      state.category = '全部';
      state.year = '全部';
      state.month = '全部';
      nodes.search.value = '';
      renderAll();
    }

    function normalizeFilterState() {
      const source = availableReports();
      if (state.category !== '全部' && !categories(source).includes(state.category)) state.category = '全部';
      if (state.year !== '全部' && !years(source).includes(state.year)) state.year = '全部';
      if (state.month !== '全部' && !months(source).includes(state.month)) state.month = '全部';
    }

    function pinCells(pin) {
      return Array.from({ length: 4 }, (_, index) => {
        const filled = index < pin.length;
        return `<span class="guest-pin-cell${filled ? ' is-filled' : ''}">${filled ? '●' : '數'}</span>`;
      }).join('');
    }

    function renderGuestPinEditor(report, isPublic) {
      if (isPublic) return '';
      const pin = effectiveGuestPin(report);
      const hasPin = pin.length === 4;
      return `
        <div class="guest-pin-editor" data-guest-pin-editor data-report-id="${escapeHtml(report.id)}">
          <div class="guest-pin-copy">
            <strong>訪客密碼</strong>
            <span>${hasPin ? '已設定四位數字。訪客開啟連結時會先看到模糊遮罩。' : '未設定密碼。此 report 不會出現在首頁，但連結可直接開啟。'}</span>
          </div>
          <label class="guest-pin-input-wrap">
            <span class="sr-only">設定四位數字訪客密碼</span>
            <input
              class="guest-pin-field"
              type="password"
              inputmode="numeric"
              pattern="[0-9]*"
              maxlength="4"
              autocomplete="off"
              placeholder="四位數字"
              value="${escapeHtml(pin)}"
              data-guest-pin-input
              data-report-id="${escapeHtml(report.id)}">
            <span class="guest-pin-digits" aria-hidden="true">${pinCells(pin)}</span>
          </label>
          <div class="guest-pin-actions">
            <button class="pin-save" type="button" data-save-guest-pin data-report-id="${escapeHtml(report.id)}" ${hasPin ? '' : 'disabled'}>儲存</button>
            <button class="pin-clear" type="button" data-clear-guest-pin data-report-id="${escapeHtml(report.id)}">清除</button>
          </div>
        </div>
      `;
    }

    function renderReport(report) {
      const parts = dateParts(report.date);
      const isLatest = report.id === latestReportId();
      const visibility = effectiveVisibility(report);
      const isPublic = visibility === 'public';
      const visibilityLabel = isPublic ? '公開' : '不公開';
      const sideText = [
        report.client,
        report.pages ? `${report.pages} 頁` : '',
        report.sizeKb ? `${report.sizeKb} KB` : ''
      ].filter(Boolean).join(' / ');
      const guestPinControls = renderGuestPinEditor(report, isPublic);
      const adminControls = adminState.isAdmin ? `
        <div class="admin-controls">
          <span class="admin-status-text">目前狀態：${escapeHtml(visibilityLabel)}</span>
          <button
            class="visibility-toggle${isPublic ? ' is-public' : ''}"
            type="button"
            role="switch"
            aria-checked="${isPublic}"
            data-visibility-toggle
            data-report-id="${escapeHtml(report.id)}">
            <span class="toggle-track" aria-hidden="true"><span class="toggle-knob"></span></span>
            <span>${escapeHtml(visibilityLabel)}</span>
          </button>
          ${guestPinControls ? `<details class="guest-pin-details"><summary>訪客密碼</summary>${guestPinControls}</details>` : ''}
        </div>
      ` : '';

      return `
        <article class="report-card${isLatest ? ' is-latest' : ''}${isPublic ? '' : ' is-private'}">
          <a class="report-main-link" href="${escapeHtml(report.file)}" aria-label="開啟${escapeHtml(report.title)}">
            <div class="date-block">
              <span class="date-day">${escapeHtml(parts.day)}</span>
              <span class="date-month">${escapeHtml(parts.year)}.${escapeHtml(parts.month)}</span>
            </div>
            <div class="report-body">
              <div class="meta">
                <span>${escapeHtml(report.category)}</span>
                <span>${escapeHtml(report.period || report.date)}</span>
                ${isLatest ? '<span class="latest-badge">最新</span>' : ''}
                ${adminState.isAdmin ? `<span class="visibility-badge ${isPublic ? 'is-public' : 'is-private'}">${escapeHtml(visibilityLabel)}</span>` : ''}
              </div>
              <h2 class="report-title">${escapeHtml(report.title)}</h2>
              <p class="report-subtitle">${escapeHtml(report.subtitle)}</p>
            </div>
            <div class="report-side">
              <span>${escapeHtml(sideText)}</span>
              <span class="open-mark">開啟報告</span>
            </div>
          </a>
          ${adminControls}
        </article>
      `;
    }

    function emptyState(title, body, canClear = false) {
      const action = canClear ? '<button class="inline-clear" type="button" data-clear-filters>清除條件</button>' : '';
      return `<div class="empty"><strong>${escapeHtml(title)}</strong>${escapeHtml(body)}${action}</div>`;
    }

    function renderTimeline() {
      normalizeFilterState();
      const items = filteredReports();
      const source = availableReports();
      renderMonthNav();
      renderStats(items);
      renderActiveFilters();

      if (hasIndexLoadError) {
        nodes.timeline.innerHTML = emptyState('索引資料尚未建立', '請先執行 npm run build。');
        nodes.resultNote.textContent = '索引資料缺失。';
        return;
      }

      if (!source.length) {
        nodes.timeline.innerHTML = emptyState('目前沒有成果報告', '將 HTML 放進 reports/ 後執行 npm run build。');
        nodes.resultNote.textContent = '目前沒有可顯示的報告。';
        return;
      }

      if (!items.length) {
        nodes.timeline.innerHTML = emptyState('沒有符合條件的成果報告', '調整搜尋、分類、年度或月份條件。', true);
        return;
      }

      const groups = groupByMonth(items);
      nodes.timeline.innerHTML = Object.entries(groups).map(([month, group]) => `
        <section class="month-group">
          <div class="month-pin">${escapeHtml(month)}</div>
          ${group.map(renderReport).join('')}
        </section>
      `).join('');
    }

    function renderAdminPanel() {
      nodes.adminLogin.href = `login.html?return=${encodeURIComponent(loginReturnPath())}`;
      nodes.adminLogin.hidden = adminState.isAdmin;
      nodes.adminLogout.hidden = !adminState.isAdmin;
      if (nodes.themePanel) {
        nodes.themePanel.hidden = !adminState.isAdmin;
        if (adminState.isAdmin) renderThemeControls();
      }
    }

    function setAdminMode(isAdmin) {
      adminState.isAdmin = isAdmin;
      if (isAdmin) {
        writeSessionValue(adminStorageKey, 'true');
      } else {
        removeSessionValue(adminStorageKey);
      }
      renderAll();
    }

    function setReportVisibility(reportId, visibility) {
      const report = reports.find((item) => item.id === reportId);
      if (!report) return;

      if (visibility === defaultVisibility(report)) {
        delete adminState.visibilityOverrides[reportId];
      } else {
        adminState.visibilityOverrides[reportId] = visibility;
      }

      saveVisibilityOverrides();
      renderAll();
    }

    function setReportGuestPin(reportId, pin) {
      const report = reports.find((item) => item.id === reportId);
      if (!report) return;
      const normalized = normalizePin(pin);
      const defaultPin = defaultGuestPin(report);

      if (!normalized && !defaultPin) {
        delete adminState.guestPins[reportId];
      } else if (normalized === defaultPin) {
        delete adminState.guestPins[reportId];
      } else {
        adminState.guestPins[reportId] = normalized;
      }

      saveGuestPins();
      renderAll();
    }

    function refreshPinInput(input) {
      const pin = normalizePin(input.value);
      input.value = pin;
      const editor = input.closest('[data-guest-pin-editor]');
      if (!editor) return;

      const digits = editor.querySelector('.guest-pin-digits');
      if (digits) digits.innerHTML = pinCells(pin);

      const saveButton = editor.querySelector('[data-save-guest-pin]');
      if (saveButton) saveButton.disabled = pin.length !== 4;
    }

    function renderAll() {
      normalizeFilterState();
      renderYearChips();
      renderChips();
      renderTimeline();
      renderAdminPanel();
    }

    nodes.search.addEventListener('input', (event) => {
      state.query = event.target.value;
      renderTimeline();
    });

    nodes.chips.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-category]');
      if (!button) return;
      state.category = button.dataset.category;
      renderAll();
    });

    nodes.yearChips.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-year]');
      if (!button) return;
      state.year = button.dataset.year;
      renderAll();
    });

    nodes.monthNav.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-month]');
      if (!button) return;
      state.month = button.dataset.month;
      renderAll();
    });

    nodes.clearFilters.addEventListener('click', resetFilters);

    nodes.timeline.addEventListener('input', (event) => {
      const input = event.target.closest('[data-guest-pin-input]');
      if (!input) return;
      refreshPinInput(input);
    });

    nodes.timeline.addEventListener('click', (event) => {
      const savePinButton = event.target.closest('[data-save-guest-pin]');
      if (savePinButton) {
        event.preventDefault();
        const editor = savePinButton.closest('[data-guest-pin-editor]');
        const input = editor?.querySelector('[data-guest-pin-input]');
        const pin = normalizePin(input?.value);
        if (pin.length !== 4) {
          if (input) {
            input.value = pin;
            refreshPinInput(input);
            input.focus();
          }
          return;
        }
        setReportGuestPin(savePinButton.dataset.reportId, pin);
        return;
      }

      const clearPinButton = event.target.closest('[data-clear-guest-pin]');
      if (clearPinButton) {
        event.preventDefault();
        setReportGuestPin(clearPinButton.dataset.reportId, '');
        return;
      }

      const visibilityButton = event.target.closest('[data-visibility-toggle]');
      if (visibilityButton) {
        event.preventDefault();
        const report = reports.find((item) => item.id === visibilityButton.dataset.reportId);
        if (!report) return;
        setReportVisibility(report.id, isPublicReport(report) ? 'private' : 'public');
        return;
      }

      if (!event.target.closest('[data-clear-filters]')) return;
      resetFilters();
    });

    nodes.themePatternButtons.forEach((button) => {
      button.addEventListener('click', () => {
        nodes.themePanel.dataset.themePattern = button.dataset.themePattern;
        saveThemeFromControls(`已套用${themePatternLabels[button.dataset.themePattern] || '背景'}`);
      });
    });

    nodes.themeSwatches.forEach((button) => {
      button.addEventListener('click', () => {
        if (nodes.themeColor) nodes.themeColor.value = button.dataset.themeColor;
        saveThemeFromControls('已套用底色');
      });
    });

    [nodes.themeColor, nodes.themeOpacity, nodes.themeBrightness, nodes.themeSize]
      .filter(Boolean)
      .forEach((control) => {
        ['input', 'change'].forEach((eventName) => {
          control.addEventListener(eventName, () => saveThemeFromControls());
        });
      });

    nodes.themeReset?.addEventListener('click', () => {
      const settings = window.NUVA_REPORT_THEME?.reset
        ? window.NUVA_REPORT_THEME.reset()
        : themeDefaults();
      renderThemeControls(settings);
      setThemeStatus('已重設');
    });

    nodes.adminLogout.addEventListener('click', () => {
      setAdminMode(false);
    });

    renderAll();
  </script>
</body>

</html>
