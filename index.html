<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成果報告時間軸</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --surface: #f4f6f2;
      --paper: #ffffff;
      --ink: #162024;
      --muted: #687271;
      --line: rgba(22, 32, 36, .16);
      --line-strong: rgba(22, 32, 36, .34);
      --red: #bd3f30;
      --teal: #1f6e72;
      --yellow: #e5bc44;
      --blue: #224a8f;
      --shadow: rgba(22, 32, 36, .12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background:
        linear-gradient(90deg, rgba(22, 32, 36, .045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(22, 32, 36, .035) 1px, transparent 1px),
        var(--surface);
      background-size: 42px 42px;
      color: var(--ink);
      font-family: "Noto Sans TC", sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 34px 0 56px;
    }

    .masthead {
      border-top: 4px solid var(--ink);
      border-bottom: 1px solid var(--line-strong);
      padding: 18px 0 30px;
    }

    .brandline,
    .section-label,
    .meta,
    .eyebrow,
    .stat-label,
    .month-pin,
    .latest-badge,
    .clear-filters,
    .filter-label {
      font-family: "Archivo", sans-serif;
      font-weight: 800;
    }

    .brandline {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: .82rem;
      text-transform: uppercase;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 42px;
      align-items: end;
      margin-top: 64px;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--teal);
      font-size: .92rem;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 820px;
      font-family: "Noto Serif TC", serif;
      font-size: 5.8rem;
      line-height: .98;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .dek {
      max-width: 620px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.9;
    }

    .archive-plate {
      position: relative;
      min-height: 300px;
      border-left: 1px solid var(--line-strong);
      padding-left: 30px;
    }

    .plate-card {
      position: absolute;
      width: 230px;
      height: 286px;
      background: var(--paper);
      border: 1px solid var(--ink);
      box-shadow: 10px 12px 0 var(--shadow);
    }

    .plate-card:nth-child(1) {
      right: 62px;
      bottom: 4px;
      transform: rotate(-7deg);
      background:
        linear-gradient(90deg, transparent 22%, rgba(189, 63, 48, .2) 22%, rgba(189, 63, 48, .2) 23%, transparent 23%),
        var(--paper);
    }

    .plate-card:nth-child(2) {
      right: 20px;
      bottom: 20px;
      transform: rotate(3deg);
      background:
        linear-gradient(0deg, transparent 72%, rgba(31, 110, 114, .16) 72%, rgba(31, 110, 114, .16) 88%, transparent 88%),
        var(--paper);
    }

    .plate-card:nth-child(3) {
      right: 42px;
      bottom: 42px;
      display: grid;
      grid-template-rows: 58px 1fr 46px;
      overflow: hidden;
    }

    .plate-card:nth-child(3)::before {
      content: "";
      background: var(--red);
      border-bottom: 1px solid var(--ink);
    }

    .plate-card:nth-child(3)::after {
      content: "";
      align-self: end;
      height: 46px;
      background: var(--yellow);
      border-top: 1px solid var(--ink);
    }

    .plate-lines {
      padding: 24px;
    }

    .plate-lines span {
      display: block;
      height: 8px;
      margin-bottom: 12px;
      background: rgba(22, 32, 36, .16);
    }

    .plate-lines span:nth-child(1) {
      width: 72%;
      height: 14px;
      background: var(--ink);
    }

    .plate-lines span:nth-child(2) {
      width: 48%;
      background: var(--teal);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(260px, 420px) 1fr;
      gap: 24px;
      align-items: start;
      margin-top: 28px;
      padding: 24px 0;
      border-bottom: 1px solid var(--line-strong);
    }

    .search {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--paper);
      padding: 0 16px;
      color: var(--ink);
      outline: none;
      box-shadow: 6px 7px 0 rgba(22, 32, 36, .08);
    }

    .search:focus {
      border-color: var(--red);
      box-shadow: 6px 7px 0 rgba(189, 63, 48, .16);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
      max-width: 100%;
    }

    .filter-panel {
      display: grid;
      gap: 14px;
      justify-items: end;
      min-width: 0;
      max-width: 100%;
    }

    .filter-line {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      min-width: 0;
      max-width: 100%;
    }

    .filter-label {
      color: var(--muted);
      font-size: .72rem;
      text-transform: uppercase;
    }

    .chip,
    .month-chip,
    .clear-filters,
    .inline-clear {
      min-height: 40px;
      border: 1px solid var(--ink);
      border-radius: 999px;
      background: transparent;
      color: var(--ink);
      padding: 0 16px;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, color .16s ease;
    }

    .chip:hover,
    .month-chip:hover,
    .clear-filters:hover,
    .inline-clear:hover {
      transform: translateY(-2px);
    }

    .chip.is-active,
    .month-chip.is-active {
      background: var(--ink);
      color: var(--paper);
    }

    .chip-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      min-height: 22px;
      margin-left: 7px;
      border-radius: 999px;
      background: rgba(22, 32, 36, .08);
      color: inherit;
      font-family: "Archivo", sans-serif;
      font-size: .74rem;
      font-weight: 900;
    }

    .chip.is-active .chip-count,
    .month-chip.is-active .chip-count {
      background: rgba(255, 255, 255, .18);
    }

    .month-nav {
      display: flex;
      gap: 10px;
      align-items: center;
      overflow-x: auto;
      padding: 18px 0;
      border-bottom: 1px solid var(--line-strong);
      scrollbar-width: thin;
    }

    .month-chip {
      flex: 0 0 auto;
      min-height: 42px;
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 5px 6px 0 rgba(22, 32, 36, .07);
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--line-strong);
    }

    .stat {
      padding: 24px 20px 22px 0;
      border-right: 1px solid var(--line);
    }

    .stat + .stat {
      padding-left: 20px;
    }

    .stat:last-child {
      border-right: 0;
    }

    .stat-label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: .78rem;
      text-transform: uppercase;
    }

    .stat-value {
      font-family: "Archivo", sans-serif;
      font-size: 2.6rem;
      font-weight: 900;
      line-height: 1;
    }

    .content {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 48px;
      margin-top: 40px;
    }

    .rail {
      position: sticky;
      top: 24px;
      align-self: start;
      padding-top: 4px;
    }

    .section-label {
      margin: 0;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--ink);
      color: var(--red);
      font-size: .86rem;
      text-transform: uppercase;
    }

    .rail-note {
      margin: 18px 0 0;
      color: var(--muted);
      line-height: 1.85;
      font-size: .95rem;
    }

    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .filter-token {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(255, 255, 255, .68);
      padding: 0 10px;
      color: var(--ink);
      font-size: .78rem;
      font-weight: 700;
    }

    .clear-filters {
      display: inline-flex;
      align-items: center;
      margin-top: 14px;
      min-height: 36px;
      border-radius: 8px;
      border-color: var(--red);
      color: var(--red);
      font-size: .78rem;
      text-transform: uppercase;
    }

    .clear-filters[hidden] {
      display: none;
    }

    .timeline {
      position: relative;
      padding-left: 28px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      top: 4px;
      bottom: 0;
      left: 0;
      width: 2px;
      background: var(--ink);
    }

    .month-group {
      position: relative;
      margin-bottom: 34px;
    }

    .month-pin {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      margin-bottom: 14px;
      border: 1px solid var(--ink);
      background: var(--yellow);
      padding: 0 12px;
      font-size: .9rem;
    }

    .month-pin::before {
      content: "";
      position: absolute;
      left: -37px;
      width: 14px;
      height: 14px;
      border: 2px solid var(--ink);
      background: var(--surface);
      border-radius: 50%;
    }

    .report-card {
      display: grid;
      grid-template-columns: 130px minmax(0, 1fr) 120px;
      gap: 22px;
      align-items: stretch;
      min-height: 164px;
      margin-bottom: 16px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--paper);
      text-decoration: none;
      overflow: hidden;
      box-shadow: 8px 9px 0 rgba(22, 32, 36, .08);
      transition: transform .16s ease, box-shadow .16s ease;
    }

    .report-card.is-latest {
      border-color: var(--red);
      box-shadow: 8px 9px 0 rgba(189, 63, 48, .12);
    }

    .report-card:hover {
      transform: translate(-2px, -3px);
      box-shadow: 12px 14px 0 rgba(22, 32, 36, .12);
    }

    .date-block {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: var(--ink);
      color: var(--paper);
      padding: 18px;
    }

    .date-day {
      font-family: "Archivo", sans-serif;
      font-size: 3.1rem;
      font-weight: 900;
      line-height: .9;
    }

    .date-month {
      color: rgba(255, 255, 255, .74);
      font-family: "Archivo", sans-serif;
      font-weight: 800;
    }

    .report-body {
      padding: 20px 0;
      min-width: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: var(--teal);
      font-size: .78rem;
      text-transform: uppercase;
    }

    .latest-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--red);
      border-radius: 999px;
      background: rgba(189, 63, 48, .08);
      color: var(--red);
      padding: 0 8px;
      font-size: .68rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .report-title {
      margin: 0;
      font-family: "Noto Serif TC", serif;
      font-size: 1.55rem;
      font-weight: 900;
      line-height: 1.35;
    }

    .report-subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: .98rem;
      line-height: 1.65;
    }

    .report-side {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      padding: 20px 18px 18px 0;
      color: var(--muted);
      font-size: .9rem;
      text-align: right;
    }

    .open-mark {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      border-bottom: 2px solid var(--red);
      color: var(--red);
      font-weight: 900;
      white-space: nowrap;
    }

    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      background: rgba(255, 255, 255, .58);
      padding: 34px;
      color: var(--muted);
      line-height: 1.8;
    }

    .empty strong {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 1.08rem;
    }

    .inline-clear {
      margin-top: 18px;
      border-color: var(--red);
      border-radius: 8px;
      color: var(--red);
      font-weight: 900;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 900px) {
      .shell {
        width: min(100% - 28px, 720px);
        padding-top: 22px;
      }

      .hero-grid,
      .content {
        grid-template-columns: 1fr;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 3.7rem;
      }

      .archive-plate {
        min-height: 220px;
        border-left: 0;
        border-top: 1px solid var(--line-strong);
        padding: 24px 0 0;
      }

      .plate-card {
        width: 170px;
        height: 212px;
      }

      .chips {
        justify-content: flex-start;
      }

      .filter-panel {
        justify-items: start;
      }

      .filter-line {
        justify-content: flex-start;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
      }

      .stat,
      .stat + .stat {
        padding-left: 0;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .rail {
        position: static;
      }

      .report-card {
        grid-template-columns: 96px minmax(0, 1fr);
      }

      .report-side {
        grid-column: 1 / -1;
        flex-direction: row;
        align-items: center;
        gap: 14px;
        padding: 0 18px 18px 114px;
        text-align: left;
      }

      .report-side > span:first-child {
        min-width: 0;
        overflow-wrap: anywhere;
      }
    }

    @media (max-width: 560px) {
      .brandline {
        flex-direction: column;
      }

      h1 {
        font-size: 2.55rem;
        max-width: 100%;
      }

      .archive-plate {
        min-height: 170px;
        overflow: hidden;
      }

      .plate-card {
        width: 142px;
        height: 178px;
      }

      .plate-card:nth-child(1) {
        right: 78px;
        bottom: 0;
      }

      .plate-card:nth-child(2) {
        right: 38px;
        bottom: 12px;
      }

      .plate-card:nth-child(3) {
        right: 58px;
        bottom: 24px;
        grid-template-rows: 48px 1fr 34px;
      }

      .plate-card:nth-child(3)::after {
        height: 34px;
      }

      .plate-lines {
        padding: 18px;
      }

      .filter-line,
      .chips {
        gap: 8px;
      }

      .chip,
      .month-chip,
      .clear-filters,
      .inline-clear {
        min-height: 36px;
        padding: 0 12px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .report-card {
        grid-template-columns: 1fr;
      }

      .date-block {
        min-height: 92px;
        flex-direction: row;
        align-items: end;
      }

      .report-body {
        padding: 18px;
      }

      .report-side {
        padding: 0 18px 18px;
      }

      .open-mark {
        flex: 0 0 auto;
      }

      .timeline {
        padding-left: 18px;
      }

      .month-pin::before {
        left: -27px;
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <header class="masthead">
      <div class="brandline">
        <span>Report Timeline Hub</span>
        <span id="generated-at">Index pending</span>
      </div>

      <div class="hero-grid">
        <div>
          <p class="eyebrow">成果報告索引</p>
          <h1>每一份成果，按時間回到現場。</h1>
          <p class="dek">依日期保存課程、活動與專案的成果報告，讓後續提案、結案與回顧都有清楚入口。</p>
        </div>
        <div class="archive-plate" aria-hidden="true">
          <div class="plate-card"></div>
          <div class="plate-card"></div>
          <div class="plate-card">
            <div class="plate-lines">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <section class="toolbar" aria-label="報告篩選">
      <label>
        <span class="sr-only">搜尋報告</span>
        <input class="search" id="search" type="search" placeholder="搜尋標題、客戶、分類或日期">
      </label>
      <div class="filter-panel">
        <div class="filter-line" id="year-chips" aria-label="年度篩選"></div>
        <div class="chips" id="category-chips" aria-label="分類篩選"></div>
      </div>
    </section>

    <nav class="month-nav" id="month-nav" aria-label="月份索引"></nav>

    <section class="stats" aria-label="索引摘要">
      <div class="stat">
        <div class="stat-label">Reports</div>
        <div class="stat-value" id="total-count">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Latest</div>
        <div class="stat-value" id="latest-date">--</div>
      </div>
      <div class="stat">
        <div class="stat-label">Categories</div>
        <div class="stat-value" id="category-count">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Months</div>
        <div class="stat-value" id="month-count">0</div>
      </div>
    </section>

    <section class="content">
      <aside class="rail">
        <p class="section-label">Timeline</p>
        <p class="rail-note" id="result-note">目前顯示全部報告。</p>
        <div class="active-filters" id="active-filters"></div>
        <button class="clear-filters" id="clear-filters" type="button" hidden>Clear Filters</button>
      </aside>
      <div class="timeline" id="timeline"></div>
    </section>
  </main>

  <script>
    window.REPORT_TIMELINE_LOAD_STATE = 'pending';
  </script>
  <script
    src="data/reports.js"
    onload="window.REPORT_TIMELINE_LOAD_STATE = 'ready'"
    onerror="window.REPORT_TIMELINE_LOAD_STATE = 'error'"></script>
  <script>
    const dataLoadState = window.REPORT_TIMELINE_LOAD_STATE;
    const payload = window.REPORT_TIMELINE || { generatedAt: '', reports: [] };
    const reports = Array.isArray(payload.reports) ? payload.reports : [];
    const hasIndexLoadError = dataLoadState === 'error';
    const latestReportId = reports[0]?.id || '';
    const state = {
      query: '',
      category: '全部',
      year: '全部',
      month: '全部'
    };

    const nodes = {
      generatedAt: document.querySelector('#generated-at'),
      totalCount: document.querySelector('#total-count'),
      latestDate: document.querySelector('#latest-date'),
      categoryCount: document.querySelector('#category-count'),
      monthCount: document.querySelector('#month-count'),
      yearChips: document.querySelector('#year-chips'),
      chips: document.querySelector('#category-chips'),
      monthNav: document.querySelector('#month-nav'),
      search: document.querySelector('#search'),
      timeline: document.querySelector('#timeline'),
      resultNote: document.querySelector('#result-note'),
      activeFilters: document.querySelector('#active-filters'),
      clearFilters: document.querySelector('#clear-filters')
    };

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatDate(date) {
      if (!date) return '--';
      const [year, month, day] = date.split('-');
      return day ? `${year}.${month}.${day}` : date;
    }

    function dateParts(date) {
      const [year = '--', month = '--', day = '--'] = String(date || '').split('-');
      return { year, month, day };
    }

    function reportYear(report) {
      return String(report.date || '').slice(0, 4) || '未設定';
    }

    function formatGeneratedAt(value) {
      if (hasIndexLoadError) return 'Index missing';
      if (!value) return 'Index pending';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return 'Index ready';
      return `Updated ${date.toLocaleString('zh-TW', { hour12: false })}`;
    }

    function categories() {
      return [...new Set(reports.map((report) => report.category).filter(Boolean))];
    }

    function years() {
      return [...new Set(reports.map(reportYear).filter(Boolean))];
    }

    function months(items = reports) {
      return [...new Set(items.map((report) => report.month).filter(Boolean))];
    }

    function countBy(items, getter) {
      return items.reduce((counts, item) => {
        const key = getter(item);
        counts[key] = (counts[key] || 0) + 1;
        return counts;
      }, {});
    }

    function reportsForMonthNav() {
      return reports.filter((report) => {
        const categoryMatch = state.category === '全部' || report.category === state.category;
        const yearMatch = state.year === '全部' || reportYear(report) === state.year;
        return categoryMatch && yearMatch;
      });
    }

    function filteredReports() {
      const query = state.query.trim().toLowerCase();
      return reports.filter((report) => {
        const categoryMatch = state.category === '全部' || report.category === state.category;
        const yearMatch = state.year === '全部' || reportYear(report) === state.year;
        const monthMatch = state.month === '全部' || report.month === state.month;
        const queryMatch = !query || String(report.search || '').toLowerCase().includes(query);
        return categoryMatch && yearMatch && monthMatch && queryMatch;
      });
    }

    function groupByMonth(items) {
      return items.reduce((groups, report) => {
        const key = report.month || '未設定日期';
        groups[key] = groups[key] || [];
        groups[key].push(report);
        return groups;
      }, {});
    }

    function renderChips() {
      const counts = countBy(reports, (report) => report.category);
      const values = ['全部', ...categories()];
      nodes.chips.innerHTML = values.map((category) => {
        const active = category === state.category ? ' is-active' : '';
        const count = category === '全部' ? reports.length : counts[category] || 0;
        return `
          <button class="chip${active}" type="button" data-category="${escapeHtml(category)}" aria-pressed="${category === state.category}">
            ${escapeHtml(category)}
            <span class="chip-count">${count}</span>
          </button>
        `;
      }).join('');
    }

    function renderYearChips() {
      const counts = countBy(reports, reportYear);
      const values = ['全部', ...years()];
      nodes.yearChips.innerHTML = values.map((year) => {
        const active = year === state.year ? ' is-active' : '';
        const label = year === '全部' ? '全部年度' : year;
        const count = year === '全部' ? reports.length : counts[year] || 0;
        return `
          <button class="chip${active}" type="button" data-year="${escapeHtml(year)}" aria-pressed="${year === state.year}">
            ${escapeHtml(label)}
            <span class="chip-count">${count}</span>
          </button>
        `;
      }).join('');
    }

    function renderMonthNav() {
      const source = reportsForMonthNav();
      const availableMonths = months(source);
      if (state.month !== '全部' && !availableMonths.includes(state.month)) {
        state.month = '全部';
      }

      const counts = countBy(source, (report) => report.month);
      const values = ['全部', ...availableMonths];
      nodes.monthNav.innerHTML = values.map((month) => {
        const active = month === state.month ? ' is-active' : '';
        const label = month === '全部' ? '全部月份' : month;
        const count = month === '全部' ? source.length : counts[month] || 0;
        return `
          <button class="month-chip${active}" type="button" data-month="${escapeHtml(month)}" aria-pressed="${month === state.month}">
            ${escapeHtml(label)}
            <span class="chip-count">${count}</span>
          </button>
        `;
      }).join('');
    }

    function renderStats(items) {
      nodes.generatedAt.textContent = formatGeneratedAt(payload.generatedAt);
      nodes.totalCount.textContent = reports.length;
      nodes.latestDate.textContent = reports[0] ? formatDate(reports[0].date) : '--';
      nodes.categoryCount.textContent = categories().length;
      nodes.monthCount.textContent = months().length;
      nodes.resultNote.textContent = items.length === reports.length
        ? '目前顯示全部報告。'
        : `目前顯示 ${items.length} / ${reports.length} 份報告。`;
    }

    function activeFilterTokens() {
      return [
        state.query.trim() ? `搜尋：${state.query.trim()}` : '',
        state.category !== '全部' ? `分類：${state.category}` : '',
        state.year !== '全部' ? `年度：${state.year}` : '',
        state.month !== '全部' ? `月份：${state.month}` : ''
      ].filter(Boolean);
    }

    function renderActiveFilters() {
      const tokens = activeFilterTokens();
      nodes.activeFilters.innerHTML = tokens.map((token) => `<span class="filter-token">${escapeHtml(token)}</span>`).join('');
      nodes.clearFilters.hidden = tokens.length === 0;
    }

    function resetFilters() {
      state.query = '';
      state.category = '全部';
      state.year = '全部';
      state.month = '全部';
      nodes.search.value = '';
      renderAll();
    }

    function renderReport(report) {
      const parts = dateParts(report.date);
      const isLatest = report.id === latestReportId;
      const sideText = [
        report.client,
        report.pages ? `${report.pages} pages` : '',
        report.sizeKb ? `${report.sizeKb} KB` : ''
      ].filter(Boolean).join(' / ');

      return `
        <a class="report-card${isLatest ? ' is-latest' : ''}" href="${escapeHtml(report.file)}">
          <div class="date-block">
            <span class="date-day">${escapeHtml(parts.day)}</span>
            <span class="date-month">${escapeHtml(parts.year)}.${escapeHtml(parts.month)}</span>
          </div>
          <div class="report-body">
            <div class="meta">
              <span>${escapeHtml(report.category)}</span>
              <span>${escapeHtml(report.period || report.date)}</span>
              ${isLatest ? '<span class="latest-badge">Latest</span>' : ''}
            </div>
            <h2 class="report-title">${escapeHtml(report.title)}</h2>
            <p class="report-subtitle">${escapeHtml(report.subtitle)}</p>
          </div>
          <div class="report-side">
            <span>${escapeHtml(sideText)}</span>
            <span class="open-mark">開啟報告</span>
          </div>
        </a>
      `;
    }

    function emptyState(title, body, canClear = false) {
      const action = canClear ? '<button class="inline-clear" type="button" data-clear-filters>清除條件</button>' : '';
      return `<div class="empty"><strong>${escapeHtml(title)}</strong>${escapeHtml(body)}${action}</div>`;
    }

    function renderTimeline() {
      const items = filteredReports();
      renderMonthNav();
      renderStats(items);
      renderActiveFilters();

      if (hasIndexLoadError) {
        nodes.timeline.innerHTML = emptyState('索引資料尚未建立', '請先執行 npm run build。');
        nodes.resultNote.textContent = '索引資料缺失。';
        return;
      }

      if (!reports.length) {
        nodes.timeline.innerHTML = emptyState('目前沒有成果報告', '將 HTML 放進 reports/ 後執行 npm run build。');
        nodes.resultNote.textContent = '目前沒有可顯示的報告。';
        return;
      }

      if (!items.length) {
        nodes.timeline.innerHTML = emptyState('沒有符合條件的成果報告', '調整搜尋、分類、年度或月份條件。', true);
        return;
      }

      const groups = groupByMonth(items);
      nodes.timeline.innerHTML = Object.entries(groups).map(([month, group]) => `
        <section class="month-group">
          <div class="month-pin">${escapeHtml(month)}</div>
          ${group.map(renderReport).join('')}
        </section>
      `).join('');
    }

    function renderAll() {
      renderYearChips();
      renderChips();
      renderTimeline();
    }

    nodes.search.addEventListener('input', (event) => {
      state.query = event.target.value;
      renderTimeline();
    });

    nodes.chips.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-category]');
      if (!button) return;
      state.category = button.dataset.category;
      renderAll();
    });

    nodes.yearChips.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-year]');
      if (!button) return;
      state.year = button.dataset.year;
      renderAll();
    });

    nodes.monthNav.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-month]');
      if (!button) return;
      state.month = button.dataset.month;
      renderAll();
    });

    nodes.clearFilters.addEventListener('click', resetFilters);

    nodes.timeline.addEventListener('click', (event) => {
      if (!event.target.closest('[data-clear-filters]')) return;
      resetFilters();
    });

    renderAll();
  </script>
</body>

</html>
